server {
    listen 80;

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

     # MEDIA files
    location /media/ {
        alias /app/media/;
    }

    # STATIC files
    location /static/ {
        alias /app/static/;
    }
}
